name: Migrate Neon Database

on:
  push:
    branches:
      - main
    paths:
      - 'backend/migrations/**'
      - 'backend/cmd/migrate/**'
      - 'backend/internal/config/**'
      - 'backend/internal/db/**'
      - '.github/workflows/migrate-neon.yml'
  workflow_dispatch:

jobs:
  migrate:
    name: Apply production migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      JWT_ACCESS_SECRET: placeholder-access-secret
      JWT_REFRESH_SECRET: placeholder-refresh-secret
      FRONTEND_ORIGIN: https://example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run migrations against Neon
        run: go run ./cmd/migrate up
