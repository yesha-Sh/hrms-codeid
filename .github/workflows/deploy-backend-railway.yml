name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-railway.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Show Railway auth mode
        run: |
          if [ -n "${RAILWAY_API_TOKEN}" ]; then
            echo "Using account/workspace token for link + variable sync."
          else
            echo "No RAILWAY_API_TOKEN found. Skipping link/variable sync and relying on Railway dashboard variables."
          fi

      - name: Link Railway project context
        if: ${{ secrets.RAILWAY_API_TOKEN != '' }}
        run: railway link --project "${{ secrets.RAILWAY_PROJECT_ID }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}" --service "${{ secrets.RAILWAY_SERVICE }}"

      - name: Sync Railway runtime variables
        if: ${{ secrets.RAILWAY_API_TOKEN != '' }}
        run: |
          railway variables set APP_ENV=production --service "${{ secrets.RAILWAY_SERVICE }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}" --skip-deploys
          railway variables set FRONTEND_ORIGIN=https://hrms-codeid.vercel.app --service "${{ secrets.RAILWAY_SERVICE }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}" --skip-deploys
          railway variables set DATABASE_URL="${{ secrets.NEON_DATABASE_URL }}" --service "${{ secrets.RAILWAY_SERVICE }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}" --skip-deploys
          railway variables set JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}" --service "${{ secrets.RAILWAY_SERVICE }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}" --skip-deploys
          railway variables set JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" --service "${{ secrets.RAILWAY_SERVICE }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}" --skip-deploys

      - name: Deploy backend service to Railway
        run: railway up backend --path-as-root --ci --service "${{ secrets.RAILWAY_SERVICE }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT }}" --project "${{ secrets.RAILWAY_PROJECT_ID }}"
